name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build lifeflow_new
        run: |
          cd lifeflow_new
          npm install
          npm run build
        working-directory: ${{ github.workspace }}

      - name: Prepare deployment
        run: |
          mkdir -p _site
          # 复制 lifeflow_new 构建产物
          cp -r lifeflow_new/dist/* _site/
          # 复制其他静态 HTML 文件夹
          cp -r accounting_lifeflow _site/
          cp -r dashboard_lifeflow _site/
          cp -r reports_lifeflow _site/
          cp -r tasks_lifeflow _site/
          # 复制根目录文件
          cp index.html _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
